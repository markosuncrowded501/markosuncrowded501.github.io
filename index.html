<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YukiMatch</title>
    <style>
        :root { 
            --primary-color: #0073aa; 
            --success-color: #46b450; 
            --bg-color: #f4f7f9; 
            --selected-color: #e67e22;
            --gray-btn: #eeeeee; 
            
            /* 语种专属色 */
            --jp-bg: #e8f4fd;
            --jp-border: #bee3f8;
            --jp-text: #2b6cb0;
            
            --zh-bg: #edf7ed;
            --zh-border: #c6f6d5;
            --zh-text: #22543d;
        }
        
        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', "Microsoft YaHei", sans-serif; 
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 15px; 
        }

        #word-game-container { 
            border: 1px solid #ddd; 
            padding: 25px; 
            border-radius: 16px; 
            width: 100%;
            max-width: 550px; 
            min-height: 520px; 
            text-align: center; 
            background-color: #ffffff; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h3 { color: #333; margin-top: 0; margin-bottom: 20px; }
        .hidden { display: none; }
        
        .setup-box { 
            border: 2px dashed #ccc; 
            padding: 30px 20px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        button { 
            padding: 12px 20px; 
            background: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            margin: 5px; 
            font-size: 16px;
            transition: opacity 0.2s, transform 0.1s; 
        }
        button:active { transform: scale(0.98); }
        
        .progress-text { color: #999; font-size: 0.85em; margin-bottom: 15px; }

        /* 核心连线网格：两列四行布局 */
        .match-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }

        /* 消除卡片基础样式 */
        .match-card {
            border-radius: 12px;
            padding: 15px 10px;
            font-size: 1.15em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 75px;
            word-break: break-all;
            border: 2px solid transparent;
        }

        /* 日语卡片样式 */
        .match-card.lang-word {
            background-color: var(--jp-bg);
            border-color: var(--jp-border);
            color: var(--jp-text);
        }
        .match-card.lang-word:hover {
            border-color: var(--primary-color);
        }

        /* 中文卡片样式 */
        .match-card.lang-def {
            background-color: var(--zh-bg);
            border-color: var(--zh-border);
            color: var(--zh-text);
        }
        .match-card.lang-def:hover {
            border-color: var(--success-color);
        }
        
        /* 被选中状态 */
        .match-card.selected {
            border-color: var(--selected-color) !important;
            background-color: #fff9f3 !important;
            color: var(--selected-color) !important;
            transform: scale(1.02);
        }

        /* 已消除隐形状态 */
        .match-card.invisible {
            visibility: hidden;
            pointer-events: none;
        }

        .feedback-text { height: 20px; font-weight: bold; margin: 8px 0; font-size: 0.9em; }

        @media (max-width: 480px) {
            #word-game-container { padding: 15px; }
            .match-card { font-size: 1em; padding: 12px 4px; min-height: 70px; }
        }
    </style>
</head>
<body>

<div id="word-game-container">
    <div id="setup-area">
        <h3>日语單詞消消樂</h3>
        <div class="setup-box">
            <input type="file" id="fileInput" accept=".txt">
            <p style="font-size: 0.8em; color: #888; margin-top: 15px;">格式：單詞,讀音,聲調,含義...</p>
        </div>
    </div>

    <div id="mode-area" class="hidden">
        <h3>已加載 <span id="total-count">0</span> 個單詞</h3>
        <p style="color:#666; font-size:0.9em; margin-bottom:15px;">每轮将随机抽取 4 个单词，中日语可任意顺序双向连线消除</p>
        <button onclick="startMatchGame()">🧩 开始连线测试</button>
    </div>

    <div id="game-area" class="hidden">
        <div class="progress-text">已消除单词: <span id="cleared-progress">0</span> / <span id="game-total">0</span></div>
        
        <div class="match-grid" id="match-grid-container"></div>

        <div id="game-feedback" class="feedback-text"></div>
        <button onclick="location.reload()" style="background:#666; width:100%; margin-top:20px; font-size: 14px;">返回菜单</button>
    </div>

    <div id="result-area" class="hidden">
        <h2 id="result-title" style="color: var(--success-color); font-size: 2.5em;">🎉 通关成功！</h2>
        <p style="color: #666; margin-bottom: 25px;">您已成功消所有单词！</p>
        <button onclick="location.reload()" style="background: var(--primary-color); width: 100%;">📁 重新选择文件</button>
    </div>
</div>

<script>
(function() {
    let originalWordList = []; 
    let remainingWords = [];    
    let currentRoundWords = []; 
    let firstSelectedCard = null; 

    const fileInput = document.getElementById('fileInput');
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            originalWordList = event.target.result.split(/\r?\n/).filter(l => l.includes(',')).map(l => {
                const p = l.split(',').map(s => s.trim());
                
                // 提取后面的所有字段作为原始释义文本
                let rawDefinition = p.slice(3).filter(x => x).join('、');
                
                // 1. 只保留中文汉字和中文常用标点符号
                let cleanDefinition = rawDefinition.replace(/[^\u4e00-\u9fa5\u3001\uff0c\uff08\uff09\u2014]/g, '').trim();
                
                // 2. 修正：去除连续出现两个及以上的顿号，直接删掉不显示
                cleanDefinition = cleanDefinition.replace(/、{2,}/g, '');
                
                // 3. 清理边缘残留的单个孤立顿号
                cleanDefinition = cleanDefinition.replace(/^、|、$/g, '').trim();
                
                // 如果过滤后变空了，兜底保留原字段防止空白卡片
                if (!cleanDefinition) cleanDefinition = rawDefinition;

                return { 
                    id: Math.random().toString(36).substr(2, 9), 
                    kanji: p[0], 
                    kana: p[1], 
                    definition: cleanDefinition
                };
            });
            if(originalWordList.length > 0) {
                document.getElementById('total-count').innerText = originalWordList.length;
                switchView('mode-area');
            } else {
                alert("未检测到有效格式的单词，请检查文件。");
            }
        };
        reader.readAsText(file);
    });

    window.startMatchGame = function() {
        remainingWords = [...originalWordList];
        shuffleArray(remainingWords); 
        document.getElementById('game-total').innerText = originalWordList.length;
        document.getElementById('cleared-progress').innerText = 0;
        switchView('game-area');
        nextRound();
    };

    function nextRound() {
        firstSelectedCard = null;
        document.getElementById('game-feedback').innerText = "";

        if (remainingWords.length === 0) {
            switchView('result-area');
            return;
        }

        currentRoundWords = remainingWords.splice(0, 4);

        let mixedPool = [];
        currentRoundWords.forEach(w => {
            mixedPool.push({ id: w.id, text: w.kanji, type: 'word' });
            mixedPool.push({ id: w.id, text: w.definition, type: 'def' });
        });

        // 邻居防死板检测打乱
        let attempts = 0;
        while (attempts < 20) {
            shuffleArray(mixedPool);
            if (!hasNeighborPairs(mixedPool)) {
                break; 
            }
            attempts++;
        }

        const gridContainer = document.getElementById('match-grid-container');
        gridContainer.innerHTML = "";

        for (let i = 0; i < 8; i++) {
            if (mixedPool[i]) {
                gridContainer.appendChild(createCardElement(mixedPool[i]));
            } else {
                gridContainer.appendChild(createEmptyPlaceholder());
            }
        }
    }

    function hasNeighborPairs(pool) {
        for (let i = 0; i < pool.length; i++) {
            if (i % 2 === 0 && i + 1 < pool.length) {
                if (pool[i].id === pool[i+1].id) return true;
            }
            if (i + 2 < pool.length) {
                if (pool[i].id === pool[i+2].id) return true;
            }
        }
        return false;
    }

    function createCardElement(item) {
        const card = document.createElement('div');
        card.className = `match-card lang-${item.type}`;
        card.innerText = item.text;
        card.dataset.id = item.id;
        card.dataset.type = item.type;

        card.addEventListener('click', function() {
            handleCardClick(card);
        });
        return card;
    }

    function createEmptyPlaceholder() {
        const card = document.createElement('div');
        card.className = 'match-card invisible';
        return card;
    }

    function handleCardClick(clickedCard) {
        const cardType = clickedCard.dataset.type;
        const cardId = clickedCard.dataset.id;
        const feedback = document.getElementById('game-feedback');

        if (!firstSelectedCard) {
            firstSelectedCard = clickedCard;
            clickedCard.classList.add('selected');
            feedback.innerText = "";
            return;
        }

        if (firstSelectedCard === clickedCard) {
            clickedCard.classList.remove('selected');
            firstSelectedCard = null;
            return;
        }

        if (firstSelectedCard.dataset.type === cardType) {
            firstSelectedCard.classList.remove('selected');
            firstSelectedCard = clickedCard;
            clickedCard.classList.add('selected');
            return;
        }

        if (firstSelectedCard.dataset.id === cardId) {
            feedback.innerText = "正确！";
            feedback.style.color = "var(--success-color)";
            
            firstSelectedCard.classList.remove('selected');
            firstSelectedCard.classList.add('invisible');
            clickedCard.classList.add('invisible');
            
            firstSelectedCard = null;

            let currentProgress = parseInt(document.getElementById('cleared-progress').innerText);
            document.getElementById('cleared-progress').innerText = currentProgress + 1;

            checkRoundComplete();
        } else {
            feedback.innerText = "❌ 错啦，再试试！";
            feedback.style.color = "red";
            firstSelectedCard.classList.remove('selected');
            firstSelectedCard = null;
        }
    }

    function checkRoundComplete() {
        const activeCards = document.querySelectorAll('.match-grid .match-card:not(.invisible)');
        if (activeCards.length === 0) {
            setTimeout(nextRound, 300);
        }
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function switchView(id) {
        ['setup-area', 'mode-area', 'game-area', 'result-area'].forEach(v => {
            document.getElementById(v).classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    }
})();
</script>
</body>
</html>
