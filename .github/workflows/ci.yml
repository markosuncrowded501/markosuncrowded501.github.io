name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Patch
        env:
          A3B2F4: ${{ secrets.A3B2F4 }}
          BC8F01: ${{ secrets.BC8F01 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          k1 = os.environ.get('A3B2F4', '')
          k2 = os.environ.get('BC8F01', '')
          idx = pathlib.Path('index.html')
          txt = idx.read_text(encoding='utf-8')
          out = txt.replace('<!-- 9f236e87c99b368f1e18aafada54816d3f4fecad68 -->', k1) if k1 else txt
          out = out.replace('<!-- 4fe3bba83611520163f0797ffd50 -->', k2) if k2 else out
          if out == txt and (k1 or k2):
              sys.exit(1)
          if out != txt:
              idx.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
